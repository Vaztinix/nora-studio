<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora Admin Desk | Security</title>
    <link rel="icon" type="image/png" href="nora.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --bg: #07090e;
            --sidebar-bg: rgba(20, 24, 38, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.07);
            --primary: #aeefff;
            --primary-glow: rgba(174, 239, 255, 0.15);
            --primary-hover: #c5f4ff;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f2f5;
            --muted: #6b7a99;
            --danger: #ff4757;
            --success: #2ed573;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(174, 239, 255, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 107, 139, 0.03) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Lock Screen Blur State */
        .lock-container {
            position: fixed;
            inset: 0;
            backdrop-filter: blur(25px);
            background: rgba(7, 9, 14, 0.85);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .lock-card {
            background: rgba(20, 24, 38, 0.6);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .lock-card i {
            font-size: 3rem;
            color: var(--danger);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        .lock-card h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .lock-card p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .btn-discord {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #5865F2;
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2);
            border: none;
            cursor: pointer;
        }

        .btn-discord:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(88, 101, 242, 0.3);
            background: #4752c4;
        }

        /* Admin Console UI (hidden initially) */
        .admin-layout {
            display: none;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .admin-header h2 {
            font-size: 2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header h2 span {
            color: var(--muted);
            font-weight: 400;
            font-size: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(20, 24, 38, 0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-action {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #ff5e6c;
        }

        .logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .logout:hover {
            color: white;
            border-color: white;
        }
    </style>
</head>
<body>

    <!-- Blurred Lock Overlay -->
    <div id="lock-screen" class="lock-container">
        <div class="lock-card">
            <i class="fas fa-lock"></i>
            <h1>Security Access Required</h1>
            <p>You must authenticate as the primary system administrator (Owner ID `1214048435632603137`) to access the Nora Admin Desk.</p>
            <button id="discord-login-btn" class="btn-discord">
                <i class="fab fa-discord"></i> Sign in with Discord
            </button>
        </div>
    </div>

    <!-- Protected Workspace UI -->
    <div id="admin-workspace" class="admin-layout">
        <div class="admin-header">
            <h2>Nora Admin Desk <span>Security Control Panel</span></h2>
            <button class="logout" onclick="logoutAdmin()">Logout</button>
        </div>

        <div class="grid">
            <!-- Premium Manager Card -->
            <div class="card">
                <h3><i class="fas fa-gem" style="color: #ffd700;"></i> Manual Premium Provision</h3>
                <div class="form-group">
                    <label>Target Type</label>
                    <select id="premium-type">
                        <option value="server">Server (Guild)</option>
                        <option value="user">User Account</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target Discord ID</label>
                    <input type="text" id="premium-id" placeholder="e.g. 1351304498185900184">
                </div>
                <div class="form-group">
                    <label>Action</label>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-action" onclick="managePremium('grant')">Grant Lifetime</button>
                        <button class="btn-action btn-danger" onclick="managePremium('revoke')">Revoke</button>
                    </div>
                </div>
            </div>

            <!-- Global Bans Manager Card -->
            <div class="card">
                <h3><i class="fas fa-ban" style="color: var(--danger);"></i> Global Mitigation Desk</h3>
                <div class="form-group">
                    <label>Action</label>
                    <select id="ban-action">
                        <option value="ban">Permanent Blacklist</option>
                        <option value="unban">Revoke Blacklist</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target User ID</label>
                    <input type="text" id="ban-user-id" placeholder="e.g. 1214048435632603137">
                </div>
                <button class="btn-action btn-danger" onclick="executeGlobalBan()">Execute Security Action</button>
            </div>
        </div>
    </div>

    <script>
        // Check OAuth Code
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        let token = localStorage.getItem('nora_admin_token');

        if (code) {
            // exchange code
            exchangeCode(code);
        } else if (token) {
            verifyToken(token);
        }

        document.getElementById('discord-login-btn').addEventListener('click', () => {
            const client_id = window.__NORA_CLIENT_ID__ || '1351304498185900184';
            const redirect_uri = encodeURIComponent(window.location.origin + window.location.pathname);
            window.location.href = `https://discord.com/oauth2/authorize?client_id=${client_id}&response_type=code&redirect_uri=${redirect_uri}&scope=identify`;
        });

        async function exchangeCode(code) {
            try {
                // Determine API base URL
                const apiBase = window.__NORA_API_BASE_URL__ || '';
                const redirect_uri = window.location.origin + window.location.pathname;
                
                const res = await fetch(`${apiBase}/api/admin/oauth-exchange`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, redirect_uri })
                });

                if (!res.ok) throw new Error('Token exchange failed');
                const data = await res.json();
                
                localStorage.setItem('nora_admin_token', data.token);
                // Clear query string
                window.history.replaceState({}, document.title, window.location.pathname);
                verifyToken(data.token);
            } catch (e) {
                alert('Authentication failed: ' + e.message);
            }
        }

        async function verifyToken(authToken) {
            try {
                const apiBase = window.__NORA_API_BASE_URL__ || '';
                const res = await fetch(`${apiBase}/api/admin/premium`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (res.status === 401 || res.status === 403) {
                    throw new Error('Not authorized admin');
                }

                if (!res.ok) throw new Error('Server error');

                // Reveal workspace
                document.getElementById('lock-screen').style.display = 'none';
                const workspace = document.getElementById('admin-workspace');
                workspace.style.display = 'block';
                setTimeout(() => workspace.style.opacity = 1, 50);
            } catch (e) {
                localStorage.removeItem('nora_admin_token');
                document.getElementById('lock-screen').style.display = 'flex';
            }
        }

        async function managePremium(action) {
            const type = document.getElementById('premium-type').value;
            const id = document.getElementById('premium-id').value;
            if (!id) return alert('Please enter a target ID');

            try {
                const apiBase = window.__NORA_API_BASE_URL__ || '';
                const res = await fetch(`${apiBase}/api/admin/premium/${action}`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('nora_admin_token')}`
                    },
                    body: JSON.stringify({ type, id })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Request failed');
                alert(data.message || 'Operation successful');
            } catch (e) {
                alert('Premium Config Error: ' + e.message);
            }
        }

        async function executeGlobalBan() {
            const action = document.getElementById('ban-action').value;
            const userId = document.getElementById('ban-user-id').value;
            if (!userId) return alert('Please enter a target User ID');

            try {
                const apiBase = window.__NORA_API_BASE_URL__ || '';
                const res = await fetch(`${apiBase}/api/admin/global-ban`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('nora_admin_token')}`
                    },
                    body: JSON.stringify({ action, userId })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Request failed');
                alert(data.message || 'Operation successful');
            } catch (e) {
                alert('Security Execution Error: ' + e.message);
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('nora_admin_token');
            window.location.reload();
        }
    </script>
</body>
</html>
