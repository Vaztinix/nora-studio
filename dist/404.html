<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora - Page Not Found</title>
    <link rel="icon" type="image/png" href="nora.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedColor = localStorage.getItem('nora_theme_color');
            if (savedColor) {
                document.documentElement.style.setProperty('--primary', savedColor);
                const r = parseInt(savedColor.slice(1, 3), 16);
                const g = parseInt(savedColor.slice(3, 5), 16);
                const b = parseInt(savedColor.slice(5, 7), 16);
                document.documentElement.style.setProperty('--accent', `rgba(${r}, ${g}, ${b}, 0.15)`);
                document.documentElement.style.setProperty('--bg-glow', `rgba(${r}, ${g}, ${b}, 0.1)`);
            }
            const mode = localStorage.getItem('nora_theme_mode') || 'default';
            if (mode !== 'default') {
                document.documentElement.classList.add('theme-' + mode);
                document.addEventListener('DOMContentLoaded', () => {
                    document.body.classList.add('theme-' + mode);
                });
            }
        })();
    </script>
    <style>
        :root {
            --bg: #0b0f1a;
            --bg-soft: #12182b;
            --bg-glow: rgba(174, 239, 255, 0.1);
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #aeefff;
            --accent: #7aa2ff;
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", system-ui, sans-serif;
            background: radial-gradient(1200px 600px at 10% -10%, var(--bg-glow), transparent),
                        radial-gradient(900px 500px at 90% 10%, var(--bg-glow), transparent),
                        var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        /* iOS-like Liquid Blobs */
        .liquid-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            transition: opacity 1.5s ease;
        }
        body.theme-glass .liquid-blob {
            opacity: 0.35;
        }
        .liquid-blob-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(174, 239, 255, 0.5) 0%, rgba(122, 162, 255, 0) 70%);
            top: 10%;
            left: 10%;
            animation: drift 25s infinite alternate ease-in-out;
        }
        .liquid-blob-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(197, 163, 255, 0.45) 0%, rgba(197, 163, 255, 0) 70%);
            bottom: 10%;
            right: 10%;
            animation: drift-reverse 30s infinite alternate ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 50px) scale(1.1); }
            100% { transform: translate(-50px, 100px) scale(0.9); }
        }
        @keyframes drift-reverse {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-100px, -50px) scale(0.85); }
            100% { transform: translate(50px, 80px) scale(1.05); }
        }

        /* Themes support */
        body.theme-oled {
            --bg: #000000;
            --border: #222222;
            --card: #080808;
        }
        body.theme-sapphire {
            --bg: #050a18;
            --border: rgba(75, 105, 255, 0.2);
            --card: rgba(8, 17, 37, 0.6);
        }
        body.theme-solid-glass {
            --bg: #07090e;
            --card: rgba(10, 14, 25, 0.85);
            --border: rgba(255, 255, 255, 0.12);
        }
        body.theme-solid-glass .error-card {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        body.theme-glass {
            --bg: #030509;
            --card: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }
        body.theme-glass .error-card {
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
        }

        .error-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .code {
            font-size: 6.5rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, var(--primary) 0%, #4b69ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #fff;
            font-weight: 700;
        }

        p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: .25s;
            text-decoration: none;
            font-size: 1rem;
            display: inline-block;
            background: var(--primary);
            color: #0b0f1a;
            box-shadow: 0 10px 25px rgba(174,239,255,.2);
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #fff;
            box-shadow: 0 15px 30px rgba(255,255,255,.25);
        }

        .countdown {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .countdown span {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="liquid-blob liquid-blob-1"></div>
    <div class="liquid-blob liquid-blob-2"></div>

    <div class="error-card">
        <div class="code">404</div>
        <h1>Off the Grid</h1>
        <p>It seems you've wandered into uncharted territory. The coordinates you requested do not exist in Nora's mainframe.</p>
        <a href="/" class="btn">Return Home</a>
        <div class="countdown">Auto-redirecting in <span id="secs">10</span> seconds...</div>
    </div>

    <script>
        let seconds = 10;
        const countdownEl = document.getElementById('secs');
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>
</html>
