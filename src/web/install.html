<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Nora to Discord</title>
    <meta name="description" content="Add Nora to your Discord server for advanced moderation and AI assistance.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="nora.png">
    <style>
        :root {
            --site-bg: #070706;
            --primary: #FFFFFF;
            --primary-hover: #EEEEEC;
            --border: #191918;
            --border-hover: #222221;
            --muted: #9D9D9D;
            --card-bg: #111110;
            --text: #EEEEEC;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--site-bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 255, 255, 0.03) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 255, 255, 0.02) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            text-align: center;
            padding: 50px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: floatUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes floatUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        img {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 15px;
            font-weight: 800;
            color: #ffffff;
        }

        p {
            color: var(--muted);
            margin: 0 0 35px;
            line-height: 1.6;
            font-size: 1rem;
        }

        .btn {
            padding: 14px 35px;
            background: var(--primary);
            color: #0b0b0a;
            text-decoration: none;
            font-weight: 600;
            border-radius: 999px;
            transition: all 0.2s ease;
            display: inline-block;
            font-size: 1rem;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: var(--primary-hover);
        }

        .back-link {
            display: block;
            margin-top: 25px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <img src="nora.png" alt="Nora" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
        </div>
        <h1>Add Nora</h1>
        <p>Enhance your community with Nora's privacy-first AI moderation and high-performance utility suite. Standard administrative permissions are required for full security integration.</p>
        
        <a href="#" id="invite-link" class="btn">Authorize Application</a>
        
        <div id="success-msg" style="display: none; margin-top: 20px; padding: 15px; background: rgba(35, 165, 90, 0.1); border: 1px solid #23a55a; border-radius: 12px; color: #23a55a; font-weight: 600;">
            ✅ Authorization Successful! Returning to previous page...
        </div>

        <a href="/" class="back-link">← Return to Home</a>
    </div>

    <script>
        const CLIENT_ID = "1375943730951098549";
        const REDIRECT_URI = encodeURIComponent(window.location.origin + window.location.pathname);
        const inviteURL = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&permissions=1102464543799&integration_type=0&scope=identify+guilds+bot+email+applications.commands&redirect_uri=${REDIRECT_URI}`;
        
        document.getElementById('invite-link').href = inviteURL;

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('guild_id')) {
            document.getElementById('invite-link').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 3000);
        }
    </script>
</body>
</html>
