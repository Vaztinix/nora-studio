<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaztinix | Founder & Developer</title>
    <meta name="description" content="Official profile of Vaztinix - Founder & Developer of Nora Studio.">
    <link rel="icon" type="image/png" href="/nora.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020205;
            --primary: #00e5ff; /* Futuristic Cyan */
            --primary-glow: rgba(0, 229, 255, 0.15);
            --secondary: #bd00ff; /* Purple Glow */
            --card-bg: rgba(10, 10, 18, 0.6);
            --border: rgba(0, 229, 255, 0.15);
            --border-hover: rgba(0, 229, 255, 0.4);
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #5865f2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas Particle Background */
        #bg-canvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: auto;
        }

        /* Holographic grid lines */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 2;
            pointer-events: none;
        }

        /* Scanlines for CRT feel */
        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 6px 100%;
            z-index: 999;
            pointer-events: none;
        }

        /* Cyberpunk Glitch Intro Overlay */
        .intro-overlay {
            position: fixed;
            inset: 0;
            background: #010103;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            padding: 40px;
        }

        .terminal-box {
            width: 100%;
            max-width: 600px;
            color: var(--primary);
            font-size: 0.95rem;
            line-height: 1.5;
            text-shadow: 0 0 8px var(--primary-glow);
        }

        .terminal-line {
            opacity: 0;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 2px solid transparent;
        }

        /* Shutter Slide Out Reveal Animation */
        .intro-overlay.reveal-left {
            animation: shutterLeft 0.8s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        .intro-overlay.reveal-right {
            animation: shutterRight 0.8s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        @keyframes shutterLeft {
            0% { clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%); }
            100% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); opacity: 0; visibility: hidden; }
        }
        @keyframes shutterRight {
            0% { clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%); }
            100% { clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%); opacity: 0; visibility: hidden; }
        }

        /* Main Profile View Port */
        .profile-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 24px;
            perspective: 1000px;
        }

        /* Animated border glowing card */
        .card-wrapper {
            position: relative;
            padding: 1px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--primary) 100%);
            background-size: 300% 300%;
            border-radius: 24px;
            animation: gradientMove 6s infinite alternate ease-in-out;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.1);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 23px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* HUD tech lines decoration */
        .hud-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid var(--primary);
            pointer-events: none;
            opacity: 0.6;
        }
        .hud-tl { top: 15px; left: 15px; border-right: none; border-bottom: none; }
        .hud-tr { top: 15px; right: 15px; border-left: none; border-bottom: none; }
        .hud-bl { bottom: 15px; left: 15px; border-right: none; border-top: none; }
        .hud-br { bottom: 15px; right: 15px; border-left: none; border-top: none; }

        /* Tech HUD Ring surrounding Avatar */
        .hud-circle-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hud-ring {
            position: absolute;
            inset: 0;
            border: 2px dashed var(--primary);
            border-radius: 50%;
            animation: rotateRing 20s linear infinite;
            opacity: 0.3;
        }

        .hud-ring-outer {
            position: absolute;
            inset: -8px;
            border: 1px solid var(--secondary);
            border-radius: 50%;
            border-top-color: transparent;
            border-bottom-color: transparent;
            animation: rotateRingBack 10s linear infinite;
            opacity: 0.4;
        }

        @keyframes rotateRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rotateRingBack {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            position: relative;
            z-index: 5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .avatar-box:hover {
            transform: scale(1.06) rotate(3deg);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #0c0a15;
            border: 3px solid #0a0813;
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #64748b;
            border: 4px solid #0d0c15;
            z-index: 6;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .handle {
            font-size: 0.95rem;
            color: var(--primary);
            font-family: 'Share Tech Mono', monospace;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        .badge {
            background: rgba(0, 229, 255, 0.05);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Share Tech Mono', monospace;
        }

        .bio-box {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(0, 229, 255, 0.08);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #94a3b8;
            position: relative;
        }

        .bio-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            width: 30px;
            height: 2px;
            background: var(--primary);
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            position: relative;
            overflow: hidden;
        }

        .social-link::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }

        .social-link:hover::after {
            transform: translateX(100%);
        }

        .social-link:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            background: rgba(0, 229, 255, 0.04);
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.1);
        }

        .social-link.discord:hover {
            border-color: var(--accent);
            color: #fff;
            background: rgba(88, 101, 242, 0.1);
            box-shadow: 0 5px 15px rgba(88, 101, 242, 0.25);
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 30px;
            transition: color 0.2s, transform 0.2s;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 0.5px;
        }

        .back-home:hover {
            color: var(--primary);
            transform: translateX(-4px);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="grid-overlay"></div>
    <div class="scanlines"></div>

    <!-- Entertaining Cyber Boot Intro Overlay -->
    <div class="intro-overlay" id="intro-screen">
        <div class="terminal-box" id="terminal-text"></div>
    </div>

    <!-- Hidden right-half screen clip reveal helper -->
    <div class="intro-overlay" id="intro-screen-right" style="display: none; background: transparent; pointer-events: none;"></div>

    <div class="profile-container">
        <div class="card-wrapper">
            <div class="profile-card">
                <div class="hud-corner hud-tl"></div>
                <div class="hud-corner hud-tr"></div>
                <div class="hud-corner hud-bl"></div>
                <div class="hud-corner hud-br"></div>

                <div class="hud-circle-container">
                    <div class="hud-ring"></div>
                    <div class="hud-ring-outer"></div>
                    <div class="avatar-box">
                        <img class="avatar" src="/ReVaztinix.jpeg" alt="vaztinix" onerror="this.onerror=null; this.src='/nora.png';">
                        <div class="status-dot" id="status-dot"></div>
                    </div>
                </div>

                <h1 class="name" id="name">Vaz</h1>
                <div class="handle" id="handle">@vaztinix</div>

                <div class="badge-container">
                    <span class="badge">Founder</span>
                    <span class="badge">Developer</span>
                </div>

                <div class="bio-box">
                    <p id="bio">💕 | I care for everyone, but those closest to me will never understand the trust they have.</p>
                </div>

                <div class="social-grid">
                    <a href="https://github.com/Vaztinix" class="social-link" target="_blank">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                    <a href="https://www.youtube.com/@Vaztinix" class="social-link" target="_blank">
                        <i class="fab fa-youtube"></i> YouTube
                    </a>
                    <a href="https://www.twitch.tv/vaztinix" class="social-link" target="_blank">
                        <i class="fab fa-twitch"></i> Twitch
                    </a>
                    <a href="https://guns.lol/vaztinix" class="social-link" target="_blank">
                        <i class="fas fa-link"></i> guns.lol
                    </a>
                    <a href="https://www.roblox.com/users/3089063186/profile" class="social-link" target="_blank">
                        <i class="fas fa-gamepad"></i> Roblox
                    </a>
                    <a href="https://discord.com/users/1214048435632603137" class="social-link discord" target="_blank">
                        <i class="fab fa-discord"></i> Discord
                    </a>
                </div>

                <a href="/" class="back-home">
                    <i class="fas fa-arrow-left"></i> BACK_TO_NORA
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Cyber Terminal Boot Intro Script ---
        const logs = [
            { text: "INITIALIZING NORA BOOTLOADER V2.1...", delay: 50 },
            { text: "ESTABLISHING SECURE PORT LINK... [CONNECTED]", delay: 150 },
            { text: "DECRYPTION MATRIX SYNC... [SUCCESS]", delay: 50 },
            { text: "MOUNTING MODULE PATH: /PUBLIC/DEV/VAZTINIX...", delay: 100 },
            { text: "PARSING SYSTEM PRIVILEGES... LEVEL: FOUNDER [OK]", delay: 80 },
            { text: "NORA ENGINE READY. ENJOY THE EXPERIENCE.", delay: 200 }
        ];

        const term = document.getElementById("terminal-text");
        let lineIdx = 0;

        function printLogLine() {
            if (lineIdx < logs.length) {
                const lineData = logs[lineIdx];
                const div = document.createElement("div");
                div.className = "terminal-line";
                div.style.opacity = 1;
                div.textContent = "> " + lineData.text;
                term.appendChild(div);
                lineIdx++;
                setTimeout(printLogLine, lineData.delay);
            } else {
                // Completed lines, kick off the shutter split reveal
                setTimeout(startShutterReveal, 400);
            }
        }

        function startShutterReveal() {
            const leftScreen = document.getElementById("intro-screen");
            const rightScreen = document.getElementById("intro-screen-right");

            // Setup right half clone
            rightScreen.innerHTML = leftScreen.innerHTML;
            rightScreen.style.display = "flex";

            // Trigger shutter animations
            leftScreen.classList.add("reveal-left");
            rightScreen.classList.add("reveal-right");

            // Clean up elements after completion
            setTimeout(() => {
                leftScreen.remove();
                rightScreen.remove();
            }, 850);
        }

        // Start Boot Animation
        setTimeout(printLogLine, 100);


        // --- 2. Interactive Canvas Particles Background ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.size = Math.random() * 2 + 1;
                this.density = (Math.random() * 30) + 15;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 229, 255, 0.55)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius) {
                    let force = (mouse.radius - distance) / mouse.radius;
                    let directionX = dx / distance;
                    let directionY = dy / distance;
                    this.x -= directionX * force * this.density;
                    this.y -= directionY * force * this.density;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx / 15;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy / 15;
                    }
                }
            }
        }

        function initParticles() {
            particles = [];
            let count = Math.floor((canvas.width * canvas.height) / 14000);
            for (let i = 0; i < count; i++) {
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                particles.push(new Particle(x, y));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        resizeCanvas();
        animateParticles();


        // --- 3. Discord User Status Data Sync ---
        const userId = '1214048435632603137';
        const statusColors = {
            online: '#23a55a',
            idle: '#f0b232',
            dnd: '#f23f43',
            offline: '#747f8d'
        };

        // Local public API fetch
        fetch(`/api/public/user/${userId}`)
            .then(res => res.json())
            .then(user => {
                if (user && !user.error) {
                    if (user.avatar) {
                        document.querySelector('.avatar').src = user.avatar;
                    }
                    if (user.globalName) {
                        document.getElementById('name').textContent = user.globalName;
                    }
                    document.getElementById('handle').textContent = `@${user.username}`;
                }
            })
            .catch(() => {});

        // Lanyard details fetch
        fetch(`https://api.lanyard.rest/v1/users/${userId}`)
            .then(res => res.json())
            .then(json => {
                if (json.success && json.data) {
                    const data = json.data;
                    const user = data.discord_user;
                    
                    if (user.avatar) {
                        const isAnimated = user.avatar.startsWith('a_');
                        const img = document.querySelector('.avatar');
                        img.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.${isAnimated ? 'gif' : 'png'}?size=256`;
                    }
                    
                    if (user.global_name) {
                        document.getElementById('name').textContent = user.global_name;
                    }
                    document.getElementById('handle').textContent = `@${user.username}`;

                    const status = data.discord_status;
                    const statusDot = document.getElementById('status-dot');
                    if (statusColors[status]) {
                        statusDot.style.backgroundColor = statusColors[status];
                    }

                    if (data.kv && data.kv.bio) {
                        document.getElementById('bio').textContent = data.kv.bio;
                    } else if (data.activities && data.activities.length > 0) {
                        const customStatus = data.activities.find(a => a.type === 4);
                        if (customStatus && customStatus.state) {
                            document.getElementById('bio').textContent = (customStatus.emoji ? customStatus.emoji.name + ' ' : '') + customStatus.state;
                        }
                    }
                }
            })
            .catch(() => {});

        // 3D Card Tilt Interaction
        const card = document.querySelector('.profile-card');
        const wrapper = document.querySelector('.card-wrapper');
        document.addEventListener('mousemove', e => {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const xc = rect.width / 2;
            const yc = rect.height / 2;
            
            const dx = (x - xc) / xc;
            const dy = (y - yc) / yc;
            
            const maxRotation = 12;
            const rotateX = -dy * maxRotation;
            const rotateY = dx * maxRotation;
            
            wrapper.style.transition = 'transform 0.1s ease';
            wrapper.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });
        
        document.addEventListener('mouseleave', () => {
            wrapper.style.transition = 'transform 0.5s ease';
            wrapper.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
        });
    </script>
</body>
</html>
